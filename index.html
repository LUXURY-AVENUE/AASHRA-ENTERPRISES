<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ BEATS LUDO CONTEST</title>
    <style>
        :root { --red: #ff4757; --blue: #1e90ff; --green: #2ed573; --yellow: #ffa502; }
        body { background: #1a1a2e; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin: 20px; text-shadow: 0 0 10px #00d2ff; }
        
        /* Ludo Board CSS */
        #ludo-container { width: 350px; height: 350px; background: white; border: 10px solid #333; display: grid; grid-template: repeat(15, 1fr) / repeat(15, 1fr); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .cell { border: 0.1px solid #ddd; }
        
        /* Coloring the board */
        .home-red { background: var(--red); grid-column: 1/7; grid-row: 1/7; border: 15px solid white; box-sizing: border-box; }
        .home-green { background: var(--green); grid-column: 10/16; grid-row: 1/7; border: 15px solid white; box-sizing: border-box; }
        .home-blue { background: var(--blue); grid-column: 1/7; grid-row: 10/16; border: 15px solid white; box-sizing: border-box; }
        .home-yellow { background: var(--yellow); grid-column: 10/16; grid-row: 10/16; border: 15px solid white; box-sizing: border-box; }
        
        .controls { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .dice { width: 60px; height: 60px; background: white; color: black; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; border-radius: 10px; cursor: pointer; border: 3px solid #f1c40f; }
        .btn-contest { background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%); border: none; padding: 10px 30px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎧 DJ BEATS LUDO CONTEST 🎧</h1>
        <p>Real-Time Multiplayer</p>
    </div>

    <div id="ludo-container">
        <div class="home-red"></div>
        <div class="home-green"></div>
