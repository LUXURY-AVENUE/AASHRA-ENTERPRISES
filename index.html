<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Gallery | Developer Ashish</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .header { padding: 15px; text-align: center; color: #00f2ff; font-size: 11px; letter-spacing: 4px; font-weight: bold; border-bottom: 1px solid #222; }
        
        /* Video Player Styling */
        .video-container { width: 100vw; height: 56.25vw; background: #000; position: relative; }
        .video-js { width: 100% !important; height: 100% !important; }

        .nav-grid { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 20px; }
        .btn { 
            background: #111; border: 1px solid #333; padding: 20px; 
            border-radius: 12px; color: #fff; font-weight: bold; 
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .active { border-color: #00f2ff; color: #00f2ff; background: rgba(0, 242, 255, 0.1); }

        /* Landscape Mode (Rotation) Logic */
        @media (orientation: landscape) {
            .header, .nav-grid { display: none; }
            .video-container { width: 100vw; height: 100vh; }
        }
    </style>
</head>
<body>

    <div class="header">LIVE TV - DEVELOPER BY ASHISH</div>

    <div class="video-container">
        <video id="live-player" class="video-js vjs-big-play-centered" controls preload="auto" data-setup='{}'>
            <source src="http://208.86.19.13:81/7288.stream/index.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <div class="nav-grid">
        <div class="btn active" onclick="playChannel('http://208.86.19.13:81/7288.stream/index.m3u8', this)">LIVE CHANNEL 1</div>
        
        <div class="btn" onclick="playChannel('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', this)">SAMPLE TV 2</div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var player = videojs('live-player');

        function playChannel(url, el) {
            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });
            player.play();

            // Button active status change karein
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        // Error handling agar stream down ho
        player.on('error', function() {
            alert("Stream Down: Ye channel abhi nahi chal raha hai.");
        });
    </script>
</body>
</html>
