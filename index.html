<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Anniversary | DJ BEATS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700;900&display=swap');

        body {
            margin: 0; padding: 0; background: #050505;
            color: #fff; font-family: 'Montserrat', sans-serif;
            text-align: center; overflow-x: hidden;
        }

        /* Entrance Overlay for Auto-play */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0b2e, #000);
            z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
        .enter-btn {
            background: linear-gradient(45deg, #ffd700, #b8860b);
            color: #000; padding: 25px 50px; font-weight: 900; font-size: 1.8rem;
            border: none; border-radius: 60px; cursor: pointer;
            box-shadow: 0 0 40px #ffd700; transition: 0.4s;
        }
        .enter-btn:hover { transform: scale(1.1); box-shadow: 0 0 60px #ffd700; }

        /* Heart Background Animation */
        .heart-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .pulsating-heart {
            position: absolute; color: rgba(255, 215, 0, 0.2);
            animation: pulse-heart 3.5s infinite ease-in-out;
        }
        @keyframes pulse-heart {
            0%, 100% { transform: scale(0.8); opacity: 0.1; }
            50% { transform: scale(1.3); opacity: 0.4; }
        }

        /* Luxury Header */
        .top-scroller {
            background: linear-gradient(90deg, #ffd700, #b8860b, #ffd700);
            color: #000; padding: 15px 0; font-weight: 900;
            position: fixed; width: 100%; top: 0; z-index: 1000;
            text-transform: uppercase; letter-spacing: 3px;
        }

        .logo-section { margin-top: 120px; }
        .logo-glow {
            width: 150px; height: 150px; border: 5px solid #ffd700;
            border-radius: 50%; margin: 0 auto; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 0 50px #ffd700, inset 0 0 30px #ffd700;
        }
        .logo-section i { font-size: 4.5rem; color: #fff; text-shadow: 0 0 25px #ffd700; }
        .brand-name { 
            font-size: 4rem; font-weight: 900; letter-spacing: 20px; 
            color: #ffd700; margin-top: 30px; display: block;
        }

        /* Hero Dashboard */
        .dashboard { max-width: 90%; margin: 60px auto; }
        .main-img {
            width: 100%; max-height: 85vh; object-fit: contain;
            border-radius: 30px; border: 4px solid rgba(255, 215, 0, 0.5);
            box-shadow: 0 30px 100px rgba(0,0,0,0.9);
        }

        .main-title { font-family: 'Great Vibes', cursive; font-size: 8rem; color: #ffd700; margin: 30px 0; }

        /* Professional Gallery - No Cutting */
        .pro-gallery {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px; padding: 40px; max-width: 1500px; margin: 0 auto;
        }
        .img-card {
            background: rgba(255,255,255,0.02); border-radius: 20px; padding: 15px;
            border: 1px solid rgba(255,215,0,0.1); transition: 0.5s;
            display: flex; align-items: center; justify-content: center; min-height: 500px;
        }
        .img-card:hover { transform: translateY(-20px); border-color: #ffd700; box-shadow: 0 0 40px rgba(255,215,0,0.2); }
        .img-card img { max-width: 100%; max-height: 480px; border-radius: 10px; object-fit: contain; }

        /* Footer */
        .final-footer {
            background: #000; padding: 100px 20px; border-top: 5px solid #ffd700; margin-top: 100px;
        }
        .dev-tag { font-size: 1.1rem; letter-spacing: 6px; color: #444; margin-top: 40px; }
        .dev-tag b { color: #ffd700; }

        /* Floating Music Control */
        #music-toggle {
            position: fixed; bottom: 40px; right: 40px;
            background: #ffd700; color: #000; width: 70px; height: 70px;
            border-radius: 50%; cursor: pointer; z-index: 5000; font-size: 2rem;
            border: none; box-shadow: 0 0 30px #ffd700;
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h2 style="color:#ffd700; font-family:'Great Vibes'; font-size: 4rem; margin-bottom: 30px;">Happy Anniversary</h2>
        <button class="enter-btn" onclick="startShow()">🎉 START CELEBRATION</button>
    </div>

    <div class="heart-container" id="hearts"></div>

    <div class="top-scroller">
        <marquee scrollamount="15">DJ BEATS KI TRAF SE HAPPY ANNIVERSARY DEEPIKA JI ✨ WISHING YOU A LIFETIME OF LOVE & TOGETHERNESS ✨</marquee>
    </div>

    <div class="logo-section">
        <div class="logo-glow"><i class="fas fa-headphones-alt"></i></div>
        <span class="brand-name">DJ BEATS</span>
    </div>

    <div class="dashboard">
        <img src="WhatsApp Image 2026-05-09 at 3.36.18 PM.jpeg" class="main-img" alt="Main Highlight">
    </div>

    <h1 class="main-title">Forever Together</h1>

    <div class="pro-gallery">
        <div class="img-card"><img src="WhatsApp Image 2026-05-09 at 2.36.48 PM.jpeg"></div>
        <div class="img-card"><img src="WhatsApp Image 2026-05-09 at 3.36.16 PM (1).jpeg"></div>
        <div class="img-card"><img src="WhatsApp Image 2026-05-09 at 3.36.16 PM.jpeg"></div>
        <div class="img-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM (1).jpeg"></div>
        <div class="img-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM (2).jpeg"></div>
        <div class="img-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM.jpeg"></div>
    </div>

    <div class="final-footer">
        <h3 style="font-family: 'Great Vibes'; font-size: 5rem; color: #ffd700; margin: 0;">Love You Always</h3>
        <p style="letter-spacing: 8px; color: #666;">A PRESENTATION BY DJ BEATS FAMILY</p>
        <div class="dev-tag">DESIGNED BY <b>ASHISH</b></div>
    </div>

    <audio id="anniversary-song" loop><source src="song.mp3" type="audio/mpeg"></audio>
    <button id="music-toggle" onclick="togglePlay()"><i class="fas fa-play"></i></button>

    <script>
        function startShow() {
            document.getElementById('welcome-screen').style.display = 'none';
            var song = document.getElementById("anniversary-song");
            song.play();
            document.getElementById("music-toggle").innerHTML = '<i class="fas fa-pause"></i>';
            createHearts();
        }

        function createHearts() {
            const container = document.getElementById('hearts');
            for (let i = 0; i < 30; i++) {
                const heart = document.createElement('i');
                heart.className = 'fas fa-heart pulsating-heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = Math.random() * 100 + 'vh';
                heart.style.fontSize = (Math.random() * 25 + 15) + 'px';
                heart.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(heart);
            }
        }

        function togglePlay() {
            var song = document.getElementById("anniversary-song");
            var btn = document.getElementById("music-toggle");
            if (song.paused) { 
                song.play(); 
                btn.innerHTML = '<i class="fas fa-pause"></i>';
            } else { 
                song.pause(); 
                btn.innerHTML = '<i class="fas fa-play"></i>';
            }
        }
    </script>
</body>
</html>
