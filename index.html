<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Under Maintenance - DJ BEATS LUDO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .container {
            padding: 20px;
            border: 2px solid #00d2ff;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            max-width: 500px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            color: #00d2ff;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #ccc;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #00d2ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .time-box {
            background: #00d2ff;
            color: #000;
            padding: 10px;
            border-radius: 8px;
            min-width: 60px;
            font-weight: bold;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <h1>MANTINACE MODE</h1>
        <p><strong>DJ BEATS LUDO CONTEST</strong> is getting an upgrade! <br> Hum kuch naye features aur fast gameplay add kar rahe hain.</p>
        
        <div class="countdown">
            <div class="time-box">01 <br><small>HRS</small></div>
            <div class="time-box" id="mins">45 <br><small>MINS</small></div>
            <div class="time-box" id="secs">00 <br><small>SECS</small></div>
        </div>

        <div class="footer">
            &copy; 2026 Developer Ashish | DJ BEATS LUDO
        </div>
    </div>

    <script>
        // Simple timer logic (optional)
        let seconds = 3600; 
        function updateTimer() {
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            document.getElementById('mins').innerHTML = m + "<br><small>MINS</small>";
            document.getElementById('secs').innerHTML = s + "<br><small>SECS</small>";
            if(seconds > 0) seconds--;
        }
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
