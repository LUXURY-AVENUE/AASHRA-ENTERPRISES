<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Anniversary | DJ BEATS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700;900&display=swap');

        body {
            margin: 0; padding: 0; background: #050505;
            color: #fff; font-family: 'Montserrat', sans-serif;
            text-align: center; overflow-x: hidden;
        }

        /* Entrance Overlay */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0b2e, #000);
            z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
        .enter-btn {
            background: linear-gradient(45deg, #ffd700, #b8860b);
            color: #000; padding: 25px 50px; font-weight: 900; font-size: 1.8rem;
            border: none; border-radius: 60px; cursor: pointer;
            box-shadow: 0 0 40px #ffd700; transition: 0.4s;
        }

        /* Top Bar */
        .top-scroller {
            background: linear-gradient(90deg, #ffd700, #b8860b, #ffd700);
            color: #000; padding: 15px 0; font-weight: 900;
            position: fixed; width: 100%; top: 0; z-index: 1000;
        }

        /* Logo */
        .logo-section { margin-top: 120px; }
        .logo-glow {
            width: 150px; height: 150px; border: 5px solid #ffd700;
            border-radius: 50%; margin: 0 auto; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 0 50px #ffd700;
        }
        .brand-name { font-size: 4rem; font-weight: 900; letter-spacing: 15px; color: #ffd700; margin-top: 20px; display: block; }

        /* Gallery */
        .pro-gallery {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px; padding: 40px; max-width: 1400px; margin: 0 auto;
        }
        .img-card {
            background: rgba(255,255,255,0.02); border-radius: 20px; padding: 15px;
            border: 1px solid rgba(255,215,0,0.1); display: flex; align-items: center; justify-content: center; min-height: 450px;
        }
        .img-card img { max-width: 100%; max-height: 420px; border-radius: 10px; object-fit: contain; }

        /* --- New Video Box Section --- */
        .video-container {
            max-width: 900px; margin: 60px auto; padding: 20px;
            background: rgba(255, 215, 0, 0.05); border-radius: 30px;
            border: 2px solid #ffd700; box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
        }
        .video-wrapper {
            position: relative; padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0; overflow: hidden; border-radius: 15px;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute; top: -60px; left: 0; /* Hiding Top Info */
            width: 100%; height: calc(100% + 120px); /* Adjusting to hide YouTube UI */
            border: none;
        }

        /* Footer */
        .final-footer { background: #000; padding: 80px 20px; border-top: 5px solid #ffd700; margin-top: 100px; }
        .dev-tag { font-size: 1rem; letter-spacing: 5px; color: #444; margin-top: 40px; }
        .dev-tag b { color: #ffd700; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h2 style="color:#ffd700; font-family:'Great Vibes'; font-size: 4rem; margin-bottom: 30px;">Forever Together</h2>
        <button class="enter-btn" onclick="startShow()">🎉 CELEBRATE NOW</button>
    </div>

    <div class="top-scroller">
        <marquee scrollamount="15">DJ BEATS PRESENTS: HAPPY ANNIVERSARY DEEPIKA JI ✨ WISHING YOU A LIFE FULL OF LOVE & MUSIC ✨</marquee>
    </div>

    <div class="logo-section">
        <div class="logo-glow"><i class="fas fa-headphones-alt" style="font-size: 4rem; color:#fff;"></i></div>
        <span class="brand-name">DJ BEATS</span>
    </div>

    <h1 style="font-family: 'Great Vibes'; font-size: 6rem; color:#ffd700; margin-top: 50px;">Love Gallery</h1>

    <div class="pro-gallery">
        <div class="img-card"><img src="WhatsApp Image 2026-05-09 at 2.36.48 PM.jpeg"></div>
        <div class="img-card"><img src="WhatsApp Image 2026-05-09 at 3.36.16 PM (1).jpeg"></div>
        <div class="img-card"><img src="WhatsApp Image 2026-05-09 at 3.36.16 PM.jpeg"></div>
        <div class="img-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM (1).jpeg"></div>
        <div class="img-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM (2).jpeg"></div>
        <div class="img-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM.jpeg"></div>
    </div>

    <h2 style="font-family: 'Great Vibes'; font-size: 4rem; color:#ffd700; margin-top: 80px;">Our Special Song</h2>
    <div class="video-container">
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/fTbsjV2vmtw?autoplay=1&mute=1&controls=0&showinfo=0&rel=0&modestbranding=1&loop=1&playlist=fTbsjV2vmtw" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <p style="margin-top: 15px; font-weight: bold; color: #ffd700;">Me to tere nal hi rehna ji ❤️</p>
    </div>

    <div class="final-footer">
        <h3 style="font-family: 'Great Vibes'; font-size: 4rem; color: #ffd700; margin: 0;">Love You Always</h3>
        <p style="letter-spacing: 8px; color: #666;">A PRESENTATION BY DJ BEATS FAMILY</p>
        <div class="dev-tag">DESIGNED BY <b>ASHISH</b></div>
    </div>

    <audio id="bg-song" loop><source src="song.mp3" type="audio/mpeg"></audio>

    <script>
        function startShow() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById("bg-song").play();
        }
    </script>
</body>
</html>
