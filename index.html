<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal 3D Anniversary | DJ BEATS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Great+Vibes&display=swap');

        body {
            margin: 0; padding: 0; background: #080808;
            color: #fff; font-family: 'Montserrat', sans-serif;
            text-align: center; overflow-x: hidden;
        }

        /* 3D Entrance Screen */
        #entrance-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0b2e, #000);
            z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column;
        }

        /* Circle Photo on Top of Button */
        .entrance-profile-box {
            position: relative; margin-bottom: 30px;
        }
        .entrance-photo {
            width: 200px; height: 200px; border-radius: 50%;
            border: 4px solid #ffd700; object-fit: cover;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.6);
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(255, 215, 0, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
        }

        .royal-btn {
            background: linear-gradient(45deg, #ffd700, #b8860b);
            color: #000; padding: 20px 50px;
            font-weight: 900; font-size: 1.4rem; border: none;
            border-radius: 50px; cursor: pointer; letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.4s;
        }
        .royal-btn:hover { transform: scale(1.1); background: #fff; box-shadow: 0 0 40px #ffd700; }

        /* Heart Background Animation */
        .heart-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .fa-heart { position: absolute; color: rgba(255, 215, 0, 0.15); animation: heartbeat 4s infinite; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); opacity: 0.1; } 50% { transform: scale(1.4); opacity: 0.4; } }

        /* Top Bar */
        .nav-bar {
            background: rgba(255, 215, 0, 0.95); color: #000; padding: 12px 0;
            font-weight: 900; position: fixed; width: 100%; top: 0; z-index: 5000;
        }

        .branding { margin-top: 110px; }
        .branding h1 { font-size: 3rem; letter-spacing: 15px; color: #ffd700; text-shadow: 2px 2px 10px #000; }

        /* Photo Frames */
        .glass-gallery {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px; padding: 40px; max-width: 1400px; margin: 0 auto;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.4s; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .glass-card:hover { transform: translateY(-10px); border-color: #ffd700; }
        .glass-card img { width: 100%; border-radius: 10px; object-fit: contain; }

        /* Video Section Fixed */
        .video-box { max-width: 900px; margin: 60px auto; border: 5px solid #ffd700; border-radius: 15px; overflow: hidden; box-shadow: 0 0 40px #ffd700; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrapper iframe { position: absolute; top: -60px; left: 0; width: 100%; height: calc(100% + 120px); border: none; }

        .footer { background: #000; padding: 80px 20px; border-top: 5px solid #ffd700; margin-top: 80px; }
    </style>
</head>
<body>

    <!-- 3D Entrance with Circle Photo -->
    <div id="entrance-layer">
        <div class="entrance-profile-box">
            <img src="WhatsApp Image 2026-05-09 at 3.36.18 PM.jpeg" class="entrance-photo" alt="Couple">
        </div>
        <h3 style="letter-spacing: 8px; color: #aaa; margin-bottom: 5px;">DJ BEATS EXCLUSIVE</h3>
        <h1 style="font-family: 'Great Vibes', cursive; font-size: 4rem; color: #ffd700; margin-bottom: 40px;">Marriage Anniversary</h1>
        <button class="royal-btn" onclick="startCelebration()">ENTER CELEBRATION</button>
    </div>

    <div class="heart-bg" id="hearts"></div>

    <div class="nav-bar">
        <marquee scrollamount="12">HAPPY ANNIVERSARY DEEPIKA JI & MAHI JI ✨ WISHING YOU SAU SAAL KA SAATH ✨ DJ BEATS PRESENTATION ✨</marquee>
    </div>

    <div class="branding">
        <h1>DJ BEATS</h1>
        <p style="letter-spacing: 10px; color: #ffd700;">THE ROYAL CELEBRATION</p>
    </div>

    <!-- Main Highlight -->
    <div style="max-width: 900px; margin: 40px auto; padding: 20px;">
        <img src="WhatsApp Image 2026-05-09 at 3.36.18 PM.jpeg" style="width:100%; border-radius:20px; border: 2px solid #ffd700;" alt="Main">
    </div>

    <!-- Photo Gallery -->
    <div class="glass-gallery">
        <div class="glass-card"><img src="WhatsApp Image 2026-05-09 at 3.58.37 PM.jpeg"></div>
        <div class="glass-card"><img src="WhatsApp Image 2026-05-09 at 2.36.48 PM.jpeg"></div>
        <div class="glass-card"><img src="WhatsApp Image 2026-05-09 at 3.36.16 PM (1).jpeg"></div>
        <div class="glass-card"><img src="WhatsApp Image 2026-05-09 at 3.36.16 PM.jpeg"></div>
        <div class="glass-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM (1).jpeg"></div>
        <div class="glass-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM (2).jpeg"></div>
        <div class="glass-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM.jpeg"></div>
    </div>

    <!-- YouTube Video Section Wapas Aagayi -->
    <h2 style="font-family: 'Great Vibes'; font-size: 4rem; color: #ffd700; margin-top: 80px;">Special Song For You</h2>
    <div class="video-box">
        <div class="video-wrapper">
            <iframe id="yt-player" src="https://www.youtube.com/embed/fTbsjV2vmtw?enablejsapi=1&autoplay=0&controls=0&modestbranding=1&rel=0" allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <div class="footer">
        <h3 style="font-family: 'Great Vibes'; font-size: 4rem; color: #ffd700; margin: 0;">Infinite Love</h3>
        <p style="letter-spacing: 6px; color: #555;">MASTERPIECE BY <b>ASHISH</b></p>
    </div>

    <audio id="main-song" loop><source src="song.mp3" type="audio/mpeg"></audio>

    <script>
        function startCelebration() {
            document.getElementById('entrance-layer').style.display = 'none';
            document.getElementById("main-song").play();
            var player = document.getElementById('yt-player');
            player.src += "&autoplay=1";
            createHearts();
        }

        function createHearts() {
            const container = document.getElementById('hearts');
            for (let i = 0; i < 35; i++) {
                const heart = document.createElement('i');
                heart.className = 'fas fa-heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = Math.random() * 100 + 'vh';
                heart.style.fontSize = (Math.random() * 25 + 10) + 'px';
                heart.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(heart);
            }
        }
    </script>
</body>
</html>
