<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Online Ludo Game</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; font-family: Arial; }
        #ludo-board { width: 450px; height: 450px; background: white; border: 5px solid #333; display: grid; grid-template: repeat(15, 1fr) / repeat(15, 1fr); }
        .cell { border: 1px solid #ddd; }
        .red { background: #ff4757; }
        .green { background: #2ed573; }
        .yellow { background: #eaffd0; }
        .blue { background: #1e90ff; }
        #dice-section { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #f1c40f; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Ludo Online</h1>
    <div id="ludo-board">
        </div>
    <div id="dice-section">
        <button onclick="rollDice()">Dice Roll Karein</button>
        <p id="dice-result">Result: 0</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
