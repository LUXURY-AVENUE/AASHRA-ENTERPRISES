<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U Playlist Player | Developer Ashish</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        .header { padding: 15px; text-align: center; color: #00f2ff; font-size: 11px; letter-spacing: 4px; font-weight: bold; border-bottom: 1px solid #222; }
        
        .video-container { width: 100vw; height: 56.25vw; background: #000; position: sticky; top: 0; z-index: 10; }
        .video-js { width: 100% !important; height: 100% !important; }

        .playlist-container { padding: 20px; }
        .channel-list { display: grid; gap: 10px; }
        .channel-btn { 
            background: #111; border: 1px solid #333; padding: 15px; 
            border-radius: 8px; color: #fff; cursor: pointer; text-align: left;
            font-size: 14px; transition: 0.3s;
        }
        .channel-btn:active { background: #222; border-color: #00f2ff; }
        .active-chan { border-color: #00f2ff; color: #00f2ff; background: rgba(0, 242, 255, 0.1); }

        @media (orientation: landscape) {
            .header, .playlist-container { display: none; }
            .video-container { height: 100vh; }
        }
    </style>
</head>
<body>

    <div class="header">TV PLAYLIST - DEVELOPER BY ASHISH</div>

    <div class="video-container">
        <video id="tv-player" class="video-js vjs-big-play-centered" controls preload="auto">
            <p class="vjs-no-js">Video dekhne ke liye JavaScript on karein.</p>
        </video>
    </div>

    <div class="playlist-container">
        <div id="list" class="channel-list">
            <p style="text-align:center; color:#888;">Playlist loading...</p>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var player = videojs('tv-player');
        var playlistUrl = "https://192.168.31.171:5001/playlist.m3u";

        // M3U Playlist fetch aur parse karne ka function
        async function loadPlaylist() {
            try {
                const response = await fetch(playlistUrl);
                const data = await response.text();
                const lines = data.split('\n');
                const listDiv = document.getElementById('list');
                listDiv.innerHTML = ''; // Loading text hatayein

                let currentName = "";

                lines.forEach(line => {
                    if (line.startsWith('#EXTINF:')) {
                        // Channel ka naam nikalna
                        currentName = line.split(',')[1] || "Unknown Channel";
                    } else if (line.startsWith('http')) {
                        // Channel ka button banana
                        let btn = document.createElement('div');
                        btn.className = 'channel-btn';
                        btn.innerText = currentName;
                        let streamUrl = line.trim();
                        
                        btn.onclick = function() {
                            playVideo(streamUrl, btn);
                        };
                        listDiv.appendChild(btn);
                    }
                });
            } catch (error) {
                document.getElementById('list').innerHTML = "<p style='color:red;'>Error: Local Server (192.168.31.171) se connect nahi ho pa rha.</p>";
            }
        }

        function playVideo(url, el) {
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
            
            document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active-chan'));
            el.classList.add('active-chan');
            window.scrollTo(0,0); // Video par wapas le jaye
        }

        loadPlaylist();
    </script>
</body>
</html>
