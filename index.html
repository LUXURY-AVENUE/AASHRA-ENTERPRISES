<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal Anniversary | DJ BEATS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;700&family=Great+Vibes&display=swap');

        body {
            margin: 0; padding: 0; background: #050505;
            color: #fff; font-family: 'Montserrat', sans-serif;
            text-align: center; overflow-x: hidden;
        }

        /* Entrance Screen */
        #entrance {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0b2e, #000);
            z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column;
            border: 10px solid #ffd700; box-sizing: border-box;
        }
        .royal-btn {
            background: #ffd700; color: #000; padding: 20px 50px;
            font-weight: 900; font-size: 1.5rem; border: none;
            cursor: pointer; letter-spacing: 3px; box-shadow: 0 0 40px #ffd700;
        }

        /* Heart Background Animation */
        .heart-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .heart {
            position: absolute; color: rgba(255, 215, 0, 0.2);
            animation: pulse 4s infinite ease-in-out;
        }
        @keyframes pulse { 0%, 100% { transform: scale(0.8); opacity: 0.1; } 50% { transform: scale(1.3); opacity: 0.4; } }

        /* Top Bar */
        .top-bar {
            background: linear-gradient(90deg, #ffd700, #b8860b, #ffd700);
            color: #000; padding: 12px 0; font-weight: 900;
            position: fixed; width: 100%; top: 0; z-index: 5000;
        }

        /* Branding */
        .header-section { margin-top: 120px; }
        .logo-ring {
            width: 130px; height: 130px; border: 3px solid #ffd700;
            border-radius: 50%; margin: 0 auto; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 0 30px #ffd700;
        }
        .brand-name { font-size: 3.5rem; font-weight: 900; letter-spacing: 12px; color: #ffd700; margin-top: 20px; }

        /* Main Dashboard (One Photo Top) */
        .dashboard-container { max-width: 900px; margin: 40px auto; padding: 20px; }
        .dashboard-img {
            width: 100%; border-radius: 10px; border: 5px solid #ffd700;
            box-shadow: 0 0 50px rgba(255,215,0,0.3); animation: float 4s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .title-text { font-family: 'Playfair Display', serif; font-size: 4rem; color: #ffd700; margin: 30px 0; }

        /* Photo Grid (Others Below in Frames) */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px; padding: 40px; max-width: 1400px; margin: 0 auto;
        }
        .frame-card {
            background: #111; padding: 15px; border: 2px solid #ffd700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.4s;
        }
        .frame-card:hover { transform: scale(1.05); box-shadow: 0 0 25px #ffd700; }
        .frame-card img { width: 100%; height: auto; object-fit: contain; }

        /* Video Section */
        .video-box {
            max-width: 900px; margin: 80px auto; padding: 10px; border: 5px solid #ffd700;
        }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-wrapper iframe { position: absolute; top: -60px; left: 0; width: 100%; height: calc(100% + 120px); border: none; }

        .footer { background: #000; padding: 80px 20px; border-top: 5px solid #ffd700; margin-top: 100px; }
        .dev-credit { font-size: 0.9rem; letter-spacing: 5px; color: #555; margin-top: 30px; }
        .dev-credit b { color: #ffd700; }
    </style>
</head>
<body>

    <div id="entrance">
        <h1 style="color:#ffd700; font-family:'Great Vibes'; font-size: 4.5rem; margin-bottom: 30px;">Happy Anniversary</h1>
        <button class="royal-btn" onclick="startCelebration()">ENTER CELEBRATION</button>
    </div>

    <div class="heart-container" id="hearts"></div>

    <div class="top-bar">
        <marquee scrollamount="12">DJ BEATS PRESENTS: HAPPY ANNIVERSARY DEEPIKA JI & MAHI JI ✨ WISHING YOU ETERNAL LOVE ✨ FOREVER TOGETHER ✨</marquee>
    </div>

    <div class="header-section">
        <div class="logo-ring"><i class="fas fa-headphones-alt" style="font-size: 3.5rem;"></i></div>
        <span class="brand-name">DJ BEATS</span>
    </div>

    <div class="dashboard-container">
        <img src="WhatsApp Image 2026-05-09 at 3.36.18 PM.jpeg" class="dashboard-img" alt="Dashboard">
    </div>

    <h1 class="title-text">A Journey of Love</h1>

    <div class="gallery-grid">
        <div class="frame-card"><img src="WhatsApp Image 2026-05-09 at 3.58.37 PM.jpeg"></div>
        <div class="frame-card"><img src="WhatsApp Image 2026-05-09 at 2.36.48 PM.jpeg"></div>
        <div class="frame-card"><img src="WhatsApp Image 2026-05-09 at 3.36.16 PM (1).jpeg"></div>
        <div class="frame-card"><img src="WhatsApp Image 2026-05-09 at 3.36.16 PM.jpeg"></div>
        <div class="frame-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM (1).jpeg"></div>
        <div class="frame-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM (2).jpeg"></div>
        <div class="frame-card"><img src="WhatsApp Image 2026-05-09 at 3.36.17 PM.jpeg"></div>
    </div>

    <div class="video-box">
        <div class="video-wrapper">
            <iframe id="yt-video" src="https://www.youtube.com/embed/fTbsjV2vmtw?enablejsapi=1&autoplay=0&controls=0&modestbranding=1&rel=0"></iframe>
        </div>
    </div>

    <div class="footer">
        <h3 style="font-family: 'Great Vibes'; font-size: 4rem; color: #ffd700; margin: 0;">Truly In Love</h3>
        <p style="letter-spacing: 5px; color: #444;">CELEBRATED BY DJ BEATS FAMILY</p>
        <div class="dev-credit">DESIGNED BY <b>ASHISH</b></div>
    </div>

    <audio id="audio-song" loop><source src="song.mp3" type="audio/mpeg"></audio>

    <script>
        function startCelebration() {
            document.getElementById('entrance').style.display = 'none';
            document.getElementById("audio-song").play();
            var video = document.getElementById('yt-video');
            video.src += "&autoplay=1";
            spawnHearts();
        }

        function spawnHearts() {
            const container = document.getElementById('hearts');
            for (let i = 0; i < 30; i++) {
                const h = document.createElement('i');
                h.className = 'fas fa-heart heart';
                h.style.left = Math.random() * 100 + 'vw';
                h.style.top = Math.random() * 100 + 'vh';
                h.style.fontSize = (Math.random() * 25 + 10) + 'px';
                h.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(h);
            }
        }
    </script>
</body>
</html>
